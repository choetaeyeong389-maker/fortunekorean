<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>오늘의 운세</title>
</head>
<body>
  <h1>오늘의 운세</h1>
  <button onclick="getFortune()">운세 보기</button>
  <p id="result"></p>

  <script>
    async function getFortune() {
      const res = await fetch("https://fortunekorean-production.up.railway.app");
      const text = await res.text();
      document.getElementById("result").innerText = text;
    }
  </script>
</body>
</html>
